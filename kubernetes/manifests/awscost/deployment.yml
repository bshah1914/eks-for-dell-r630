apiVersion: v1
kind: Namespace
metadata:
  name: awscost
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: awscost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: awscost-redis
  template:
    metadata:
      labels:
        app: awscost-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: awscost
spec:
  selector:
    app: awscost-redis
  ports:
    - port: 6379
      targetPort: 6379
---
# Web App
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: awscost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: awscost-web
  template:
    metadata:
      labels:
        app: awscost-web
    spec:
      containers:
        - name: web
          image: awscost-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: CACHE_BACKEND
              value: "redis"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: COLLECTOR_ENABLED
              value: "false"
            - name: SECRET_KEY
              value: "k8s-secret-key-change-me"
            - name: SCRIPT_NAME
              value: ""
            - name: PREFERRED_URL_SCHEME
              value: "http"
            - name: APPLICATION_ROOT
              value: "/"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: awscost
spec:
  selector:
    app: awscost-web
  ports:
    - port: 5000
      targetPort: 5000
---
# Worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: awscost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: awscost-worker
  template:
    metadata:
      labels:
        app: awscost-worker
    spec:
      containers:
        - name: worker
          image: awscost-worker:latest
          imagePullPolicy: Never
          env:
            - name: CACHE_BACKEND
              value: "redis"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: COLLECTOR_INTERVAL
              value: "300"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
# Nginx frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: awscost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: awscost-nginx
  template:
    metadata:
      labels:
        app: awscost-nginx
    spec:
      containers:
        - name: nginx
          image: awscost-nginx:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: awscost
spec:
  type: NodePort
  selector:
    app: awscost-nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30002
